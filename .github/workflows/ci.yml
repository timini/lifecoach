name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: extractions/setup-just@v2
        with:
          just-version: '1.36.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Storybook stories run via @storybook/addon-vitest in chromium browser
      # mode (apps/ui-book). The chromium binary isn't bundled with the
      # playwright npm package — install it explicitly here so the test step
      # can launch it. Linux deps come via --with-deps.
      - name: Install Playwright chromium
        run: pnpm --filter @lifecoach/ui-book exec playwright install --with-deps chromium

      - name: Guard — no IP-based geolocation
        run: just guard-no-ip-geolocation

      - name: Guard — every UI tier component has a story
        run: node scripts/check-stories.mjs

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage (90% gate)
        run: pnpm test:coverage
