name: Preview teardown

on:
  pull_request:
    types: [closed]

# Same group as pr-preview-deploy so a closing PR queues behind any
# in-flight deploy rather than racing it. cancel-in-progress=false because
# you don't want to cancel a destroy mid-way through.
concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  teardown:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    env:
      CLOUDSDK_CORE_PROJECT: lifecoach-dev-zvb6d
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4
        # Check out main, not the PR branch — the branch may have been
        # deleted by GitHub's auto-delete-on-merge setting before this
        # workflow runs.
        with:
          ref: main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x
          terraform_wrapper: false

      - name: Restore terraform.tfvars
        run: |
          if [[ -z "${TFVARS_DEV}" ]]; then
            echo "::error::TFVARS_DEV secret is not set."
            exit 1
          fi
          printf '%s' "${TFVARS_DEV}" > infra/envs/dev/terraform.tfvars
        env:
          TFVARS_DEV: ${{ secrets.TFVARS_DEV }}

      - name: Write backend.hcl
        run: |
          cat > infra/envs/dev/backend.hcl <<EOF
          bucket = "${CLOUDSDK_CORE_PROJECT}-tfstate"
          prefix = "terraform/state"
          EOF

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Tear down preview
        run: infra/preview-teardown.sh

      - name: Comment teardown confirmation
        uses: actions/github-script@v7
        with:
          script: |
            const wasMerged = ${{ github.event.pull_request.merged }};
            const verb = wasMerged ? 'merged' : 'closed';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🧹 Preview torn down — PR was ${verb}.`,
            });
