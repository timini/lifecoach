name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

# One in-flight deploy per PR. New pushes cancel the old one (build+apply
# can take a few minutes — no point applying stale image tags).
# IMPORTANT: the teardown workflow uses the SAME group so a closing PR
# never races a still-running deploy.
concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    # Forks have no access to repo secrets / WIF, so the auth step would
    # fail anyway. Skip rather than fail loudly.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    env:
      CLOUDSDK_CORE_PROJECT: lifecoach-dev-zvb6d
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GIT_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: extractions/setup-just@v2
        with:
          just-version: '1.36.0'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x
          terraform_wrapper: false

      - name: Restore terraform.tfvars
        run: |
          if [[ -z "${TFVARS_DEV}" ]]; then
            echo "::error::TFVARS_DEV secret is not set."
            exit 1
          fi
          printf '%s' "${TFVARS_DEV}" > infra/envs/dev/terraform.tfvars
        env:
          TFVARS_DEV: ${{ secrets.TFVARS_DEV }}

      - name: Write backend.hcl
        run: |
          cat > infra/envs/dev/backend.hcl <<EOF
          bucket = "${CLOUDSDK_CORE_PROJECT}-tfstate"
          prefix = "terraform/state"
          EOF

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview
        id: deploy
        run: |
          # The script prints `[preview-deploy] ...` chatter to stderr and
          # one JSON line to stdout. Capture stdout into a step output.
          out=$(infra/preview-deploy.sh)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$out" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Also extract individual fields for the e2e step.
          echo "agent_url=$(echo "$out" | jq -r .agent_url)" >> "$GITHUB_OUTPUT"
          echo "web_url=$(echo "$out" | jq -r .web_url)" >> "$GITHUB_OUTPUT"

      - name: Fetch e2e test password
        id: e2e_password
        run: |
          pw=$(gcloud secrets versions access latest \
            --secret=E2E_TEST_PASSWORD \
            --project="${CLOUDSDK_CORE_PROJECT}")
          echo "::add-mask::${pw}"
          echo "password=${pw}" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        run: pnpm --filter @lifecoach/web exec playwright install --with-deps chromium

      - name: Run e2e against preview
        id: e2e
        # Don't fail the job on e2e failure — we still want to comment the
        # URL so the user can poke at it.
        continue-on-error: true
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.web_url }}
          E2E_TEST_EMAIL: e2e-test@lifecoach.invalid
          E2E_TEST_PASSWORD: ${{ steps.e2e_password.outputs.password }}
        run: pnpm --filter @lifecoach/web exec playwright test

      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const agentUrl = '${{ steps.deploy.outputs.agent_url }}';
            const webUrl = '${{ steps.deploy.outputs.web_url }}';
            const e2eOutcome = '${{ steps.e2e.outcome }}';
            const e2eEmoji = e2eOutcome === 'success' ? '✅' : '❌';

            const body = [
              '### 🚀 Preview deployed',
              '',
              `- **Web:** ${webUrl}`,
              `- **Agent:** ${agentUrl}`,
              '',
              `**E2E:** ${e2eEmoji} \`${e2eOutcome}\` — see [the run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              '',
              '_Closing this PR tears the preview down automatically._',
            ].join('\n');

            // Find an existing preview comment from this bot so we update
            // it on subsequent pushes instead of stacking new comments.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.startsWith('### 🚀 Preview deployed'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload Playwright traces
        if: always() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-pr-${{ env.PR_NUMBER }}
          path: apps/web/test-results
          retention-days: 7
