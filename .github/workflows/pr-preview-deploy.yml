name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

# One in-flight deploy per PR. New pushes cancel the old one (build+apply
# can take a few minutes — no point applying stale image tags).
# IMPORTANT: the teardown workflow uses the SAME group so a closing PR
# never races a still-running deploy.
concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    # Forks have no access to repo secrets / WIF, so the auth step would
    # fail anyway. Skip rather than fail loudly.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    env:
      CLOUDSDK_CORE_PROJECT: lifecoach-dev-zvb6d
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GIT_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: extractions/setup-just@v2
        with:
          just-version: '1.36.0'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x
          terraform_wrapper: false

      - name: Restore terraform.tfvars
        run: |
          if [[ -z "${TFVARS_DEV}" ]]; then
            echo "::error::TFVARS_DEV secret is not set."
            exit 1
          fi
          printf '%s' "${TFVARS_DEV}" > infra/envs/dev/terraform.tfvars
        env:
          TFVARS_DEV: ${{ secrets.TFVARS_DEV }}

      - name: Write backend.hcl
        run: |
          cat > infra/envs/dev/backend.hcl <<EOF
          bucket = "${CLOUDSDK_CORE_PROJECT}-tfstate"
          prefix = "terraform/state"
          EOF

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview
        id: deploy
        run: |
          # The script prints `[preview-deploy] ...` chatter to stderr and
          # one JSON line to stdout. Capture stdout into a step output.
          out=$(infra/preview-deploy.sh)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$out" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Also extract individual fields for the e2e step.
          echo "agent_url=$(echo "$out" | jq -r .agent_url)" >> "$GITHUB_OUTPUT"
          echo "web_url=$(echo "$out" | jq -r .web_url)" >> "$GITHUB_OUTPUT"
          # custom_web_url is empty until dev's domain module is applied;
          # downstream steps render it conditionally.
          echo "custom_web_url=$(echo "$out" | jq -r '.custom_web_url // ""')" >> "$GITHUB_OUTPUT"

      # Comment the URL straight after deploy — before e2e runs — so the PR
      # author can start poking at the preview while Playwright catches up.
      # The same step (with `e2e_outcome`) re-runs after e2e and updates the
      # SAME comment in place (matched by the leading marker line).
      - name: Comment preview URLs (pre-e2e)
        uses: actions/github-script@v7
        env:
          AGENT_URL: ${{ steps.deploy.outputs.agent_url }}
          WEB_URL: ${{ steps.deploy.outputs.web_url }}
          CUSTOM_WEB_URL: ${{ steps.deploy.outputs.custom_web_url }}
          E2E_OUTCOME: running
        with:
          script: |
            const agentUrl = process.env.AGENT_URL;
            const webUrl = process.env.WEB_URL;
            const customWebUrl = process.env.CUSTOM_WEB_URL;
            const e2eOutcome = process.env.E2E_OUTCOME;
            const e2eEmoji = e2eOutcome === 'success' ? '✅' : (e2eOutcome === 'running' ? '⏳' : '❌');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Prefer the custom-domain URL exclusively — *.run.app URLs are
            // on the Public Suffix List, so Firebase Auth's wildcarding
            // doesn't cover them and we'd otherwise have to maintain a
            // per-PR allowlist in tfvars. The custom URL is on a 15-30 min
            // cert-provisioning lag for a first-time hostname; reviewers
            // see a brief HTTPS error during that window. Worth it to keep
            // one obvious, auth-working URL in the comment.
            //
            // The .run.app URL is still wired internally — Playwright targets
            // it via E2E_BASE_URL — but we no longer surface it here.
            //
            // Fallback path: when custom_web_url is empty (dev's domain module
            // hasn't applied yet, or rolled back), show the .run.app URL so
            // the comment isn't link-less.
            const webLine = customWebUrl
              ? `- **Web:** ${customWebUrl}  _— Firebase Auth-ready. Fresh PRs have a ~15-30 min HTTPS-cert warm-up._`
              : `- **Web:** ${webUrl}  _— custom domain not provisioned; this *.run.app URL won't pass Firebase Auth._`;
            const body = [
              '### 🚀 Preview deployed',
              '',
              webLine,
              '',
              `**E2E:** ${e2eEmoji} \`${e2eOutcome}\` — see [the run](${runUrl}) for details.`,
              '',
              '_Closing this PR tears the preview down automatically._',
            ].join('\n');

            // Match an existing preview comment from this bot so we update
            // it in place instead of stacking new comments per push / per
            // pre-e2e+post-e2e step pair.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.startsWith('### 🚀 Preview deployed'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fetch e2e test password
        id: e2e_password
        run: |
          pw=$(gcloud secrets versions access latest \
            --secret=E2E_TEST_PASSWORD \
            --project="${CLOUDSDK_CORE_PROJECT}")
          echo "::add-mask::${pw}"
          echo "password=${pw}" >> "$GITHUB_OUTPUT"

      # Cache Playwright browsers between runs. Cache key includes the
      # @playwright/test version pin so a bump invalidates automatically.
      # The `--with-deps` system packages aren't cacheable (apt installs);
      # keep them in the install step but skip the browser download on hit.
      - name: Resolve Playwright version
        id: pw_version
        run: |
          v=$(node -p "require('./apps/e2e/package.json').devDependencies['@playwright/test'] || require('./apps/e2e/package.json').dependencies['@playwright/test']")
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw_version.outputs.version }}

      - name: Install Playwright browsers
        run: |
          if [[ "${{ steps.pw_cache.outputs.cache-hit }}" == "true" ]]; then
            # Browser binaries restored from cache — only need OS deps.
            pnpm --filter @lifecoach/e2e exec playwright install-deps chromium
          else
            pnpm --filter @lifecoach/e2e exec playwright install --with-deps chromium
          fi

      - name: Run e2e against preview
        id: e2e
        # Don't fail the job on e2e failure — the URL is already commented.
        continue-on-error: true
        env:
          E2E_BASE_URL: ${{ steps.deploy.outputs.web_url }}
          E2E_TEST_EMAIL: e2e-test@lifecoach.invalid
          E2E_TEST_PASSWORD: ${{ steps.e2e_password.outputs.password }}
        run: pnpm --filter @lifecoach/e2e e2e

      - name: Comment preview URLs (post-e2e)
        if: always()
        uses: actions/github-script@v7
        env:
          AGENT_URL: ${{ steps.deploy.outputs.agent_url }}
          WEB_URL: ${{ steps.deploy.outputs.web_url }}
          CUSTOM_WEB_URL: ${{ steps.deploy.outputs.custom_web_url }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
        with:
          script: |
            const agentUrl = process.env.AGENT_URL;
            const webUrl = process.env.WEB_URL;
            const customWebUrl = process.env.CUSTOM_WEB_URL;
            const e2eOutcome = process.env.E2E_OUTCOME;
            const e2eEmoji = e2eOutcome === 'success' ? '✅' : (e2eOutcome === 'running' ? '⏳' : '❌');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Same single-URL logic as the pre-e2e comment — see the longer
            // rationale there.
            const webLine = customWebUrl
              ? `- **Web:** ${customWebUrl}  _— Firebase Auth-ready. Fresh PRs have a ~15-30 min HTTPS-cert warm-up._`
              : `- **Web:** ${webUrl}  _— custom domain not provisioned; this *.run.app URL won't pass Firebase Auth._`;
            const body = [
              '### 🚀 Preview deployed',
              '',
              webLine,
              '',
              `**E2E:** ${e2eEmoji} \`${e2eOutcome}\` — see [the run](${runUrl}) for details.`,
              '',
              '_Closing this PR tears the preview down automatically._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.startsWith('### 🚀 Preview deployed'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload Playwright traces
        if: always() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-pr-${{ env.PR_NUMBER }}
          path: apps/web/test-results
          retention-days: 7
