pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm turbo run typecheck
    test:
      glob: "*.{ts,tsx}"
      run: pnpm turbo run test -- --run --changed HEAD
    no-ip-geolocation:
      run: |
        if git diff --cached --name-only | xargs -I{} grep -l -E "(x-forwarded-for|geoip|geolite|ipinfo|ipapi|ip-api)" {} 2>/dev/null; then
          echo "ERROR: IP-based geolocation is forbidden. Use navigator.geolocation only." >&2
          exit 1
        fi

pre-push:
  commands:
    coverage:
      run: pnpm turbo run test:coverage
