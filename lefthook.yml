pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm turbo run typecheck
    test:
      glob: "*.{ts,tsx}"
      run: pnpm turbo run test -- --run --changed HEAD
    # Mirrors `just guard-no-ip-geolocation` — scans code + package
    # manifests only, so docs/configs can reference the rule by name
    # without false positives.
    no-ip-geolocation:
      glob: "{apps,packages}/**/src/**/*.{ts,tsx},{apps,packages}/*/package.json"
      run: |
        if [ -z "{staged_files}" ]; then exit 0; fi
        if echo {staged_files} | tr ' ' '\n' | xargs grep -l -I -E "(x-forwarded-for|cf-connecting-ip|geoip-lite|@maxmind|ipinfo|ip-api\.com|ipapi\.co|node-geoip)" 2>/dev/null; then
          echo "ERROR: IP-based geolocation is forbidden. Use navigator.geolocation only." >&2
          exit 1
        fi
    # Every component in packages/ui/src/{atoms,molecules,organisms,templates}/
    # must have a sibling .stories.tsx — stories are the test surface here.
    check-stories:
      glob: "packages/ui/src/{atoms,molecules,organisms,templates}/**/*.tsx"
      run: node scripts/check-stories.mjs

pre-push:
  commands:
    coverage:
      run: pnpm turbo run test:coverage
