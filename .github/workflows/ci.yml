name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: extractions/setup-just@v2
        with:
          just-version: '1.36.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Storybook stories run via @storybook/addon-vitest in chromium browser
      # mode (apps/ui-book). The chromium binary isn't bundled with the
      # playwright npm package — install it explicitly here so the test step
      # can launch it. Linux deps come via --with-deps.
      - name: Install Playwright chromium
        run: pnpm --filter @lifecoach/ui-book exec playwright install --with-deps chromium

      - name: Guard — no IP-based geolocation
        run: just guard-no-ip-geolocation

      - name: Guard — every UI tier component has a story
        run: node scripts/check-stories.mjs

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage (90% gate)
        run: pnpm test:coverage

  python-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: '0.5.x'
          enable-cache: true
          cache-dependency-glob: apps/agent_py/uv.lock

      - uses: extractions/setup-just@v2
        with:
          just-version: '1.36.0'

      - name: Install Python dependencies
        run: cd apps/agent_py && uv sync --frozen

      - name: Lint (ruff)
        run: just lint-py

      # Mypy is deliberately NOT run here — the codebase has ~27 pre-existing
      # strict-mode violations (FunctionTool re-export quirks, a few unused
      # type-ignores, two real return-type issues in main.py). Wiring mypy
      # in now would block every PR on debt none of them caused. Run
      # `just typecheck-py` locally; re-enable here once the backlog clears.
      #
      # Full Python unit suite — also covers Tier-0 eval-set fixture-shape
      # smoke (tests/evals/test_eval_cases.py). Tier-1 (real Gemini) is
      # opt-in via LIFECOACH_EVAL_REAL_LLM and skipped here.
      - name: Test (pytest)
        run: just test-py
